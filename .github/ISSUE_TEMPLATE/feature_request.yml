name: Feature Request
description: Suggest a new feature or enhancement for Civic Brief
labels: ["Type: Feature", "Status: Needs Triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a feature. Please describe the problem you are trying to solve and your proposed solution.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve? Who experiences it?
      placeholder: "When I try to ..., I cannot ... because ..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: How should this work? What is the simplest version?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What other approaches did you consider? Why is your proposed solution better?

  - type: dropdown
    id: scenario
    attributes:
      label: Scenario
      description: Which civic scenario does this relate to?
      options:
        - Budget tracking
        - School board
        - Zoning
        - Legislation
        - Multilingual access
        - Cross-cutting (all scenarios)
        - Infrastructure / DevOps
    validations:
      required: true

  - type: textarea
    id: success
    attributes:
      label: Success Criteria
      description: How would we know this feature is working well?
      placeholder: "Users can ... and the result is ..."

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any mockups, links, or references that help explain the feature.
